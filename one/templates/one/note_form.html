{% extends 'one/base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto skeuo-gradient-bg rounded-2xl p-8 shadow-skeuo-flat border border-white">
    <h2 class="text-2xl font-bold text-gray-700 mb-6 skeuo-text-engraved">
        {% if object %}Edit Note{% else %}Create Note{% endif %}
    </h2>
    
    <form method="post" class="space-y-6">
        {% csrf_token %}
        
        <div class="flex flex-col">
            <label for="id_title" class="mb-2 font-semibold text-gray-600">Title</label>
            <input type="text" name="title" id="id_title" value="{{ form.title.value|default_if_none:'' }}" required
                   class="w-full bg-gray-200 text-gray-800 rounded-xl p-4 shadow-skeuo-pressed border-none focus:outline-none focus:ring-2 focus:ring-orange-400 transition-shadow">
        </div>

        <div class="flex flex-col">
            <label for="id_content" class="mb-2 font-semibold text-gray-600">Content</label>
            <textarea name="content" id="id_content" rows="6" required
                      class="w-full bg-gray-200 text-gray-800 rounded-xl p-4 shadow-skeuo-pressed border-none focus:outline-none focus:ring-2 focus:ring-orange-400 transition-shadow resize-none">{{ form.content.value|default_if_none:'' }}</textarea>
        </div>

        <div class="flex justify-end space-x-4 pt-4">
            <a href="{% url 'one:note_list' %}" class="px-6 py-3 rounded-lg font-semibold text-gray-600 bg-gray-200 border border-gray-300 shadow-skeuo-flat active:shadow-skeuo-pressed active:translate-y-1 transition-all">
                Cancel
            </a>
            <button type="submit" class="px-6 py-3 rounded-lg font-semibold text-white bg-gradient-to-b from-orange-400 to-orange-600 border border-orange-700 shadow-skeuo-btn active:shadow-skeuo-pressed active:translate-y-1 transition-all duration-150">
                Save Note
            </button>
        </div>
    </form>
</div>
{% endblock %}
