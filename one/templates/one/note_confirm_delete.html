{% extends 'one/base.html' %}

{% block content %}
<div class="max-w-xl mx-auto skeuo-gradient-bg rounded-2xl p-8 shadow-skeuo-flat border border-white text-center">
    <h2 class="text-2xl font-bold text-gray-800 mb-4">Are you sure?</h2>
    
    <p class="text-gray-600 mb-8 leading-relaxed">
        You are about to delete the note <span class="font-bold text-gray-800">"{{ object.title }}"</span>. This action cannot be undone.
    </p>

    <form method="post" class="flex justify-center space-x-6">
        {% csrf_token %}
        <a href="{% url 'one:note_list' %}" class="px-6 py-3 rounded-lg font-semibold text-gray-600 bg-gray-200 border border-gray-300 shadow-skeuo-flat active:shadow-skeuo-pressed active:translate-y-1 transition-all">
            Cancel
        </a>
        <button type="submit" class="px-6 py-3 rounded-lg font-semibold text-white bg-gradient-to-b from-red-500 to-red-700 border border-red-800 shadow-skeuo-btn active:shadow-skeuo-pressed active:translate-y-1 transition-all duration-150">
            Confirm Delete
        </button>
    </form>
</div>
{% endblock %}
