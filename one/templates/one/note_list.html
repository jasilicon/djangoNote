{% extends 'one/base.html' %}

{% block content %}
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
    {% for note in notes %}
    <div class="skeuo-gradient-bg rounded-2xl p-6 shadow-skeuo-flat border border-white flex flex-col justify-between h-64">
        <div>
            <h2 class="text-xl font-bold text-gray-700 border-b border-gray-300 pb-2 mb-3 shadow-[0_1px_0_white]">
                {{ note.title }}
            </h2>
            <p class="text-gray-600 line-clamp-4 leading-relaxed">{{ note.content }}</p>
        </div>
        
        <div class="flex justify-between items-center mt-4 pt-4 ">
            <span class="text-xs font-semibold text-gray-500">{{ note.updated_at|date:"M d, Y" }}</span>
            <div class="space-x-3">
                <a href="{% url 'one:note_update' note.pk %}" class="bg-gray-100 rounded-2xl px-3 py-1 text-sm font-bold text-orange-600 hover:text-orange-700 active:translate-y-px inline-block transition-transform">Edit</a>
                <a href="{% url 'one:note_delete' note.pk %}" class="bg-red-500 rounded-2xl px-3 py-1 text-sm font-bold text-gray-100 hover:text-red-700 active:translate-y-px inline-block transition-transform">Delete</a>
            </div>
        </div>
    </div>
    {% empty %}
    <div class="col-span-full flex justify-center items-center h-48 skeuo-gradient-bg rounded-2xl shadow-skeuo-flat border border-white">
        <p class="text-xl font-bold text-gray-500 skeuo-text-engraved">Your notebook is empty.</p>
    </div>
    {% endfor %}
</div>
{% endblock %}
