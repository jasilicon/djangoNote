<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GlassNotes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Reusing the smooth purple background animation */
        @keyframes gradientLoop {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        body {
            background: linear-gradient(-45deg, #2e1065, #4c1d95, #6b21a8, #3b0764);
            background-size: 400% 400%;
            animation: gradientLoop 15s ease infinite;
            color: #f3f4f6;
        }

        /* Glass panel */
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px) saturate(120%);
            -webkit-backdrop-filter: blur(16px) saturate(120%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .glass-button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(4px);
            transition: all 0.3s ease-in-out;
            color: white;
        }
        .glass-button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
        }
        .glass-button:active { transform: translateY(1px); }

        /* Magic CSS for Django's auto-generated form fields */
        .django-form p {
            display: flex;
            flex-direction: column;
            margin-bottom: 1.5rem;
        }
        .django-form label {
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #e9d5ff; /* text-purple-200 */
            letter-spacing: 0.025em;
        }
        .django-form input {
            width: 100%;
            background: rgba(0, 0, 0, 0.15);
            color: white;
            border-radius: 0.75rem; 
            padding: 1rem; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .django-form input:focus {
            outline: none;
            background: rgba(0, 0, 0, 0.25);
            border-color: rgba(196, 181, 253, 0.5);
            box-shadow: 0 0 0 2px rgba(196, 181, 253, 0.2);
        }
        
        .errorlist {
            color: #f472b6; /* text-pink-400 */
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
            font-weight: 600;
            padding-left: 0;
            list-style: none;
        }
        .helptext {
            font-size: 0.8rem;
            color: #a78bfa; /* text-purple-400 */
            margin-top: 0.35rem;
        }
    </style>
</head>
<body class="min-h-screen font-sans antialiased flex items-center justify-center p-4">
    
    <div class="w-full max-w-md glass-panel rounded-3xl p-10">
        
        <div class="text-center mb-8 border-b border-white/10 pb-6">
            <h2 class="text-3xl font-bold text-white tracking-tight mb-2">Welcome Back</h2>
            <p class="text-purple-300 font-medium text-sm">Access your notes</p>
        </div>

        <form method="post" class="django-form">
            {% csrf_token %}
            
            {{ form.as_p }}
            
            <div class="mt-8 pt-2">
                <button type="submit" class="w-full px-6 py-4 rounded-xl font-bold text-lg glass-button">
                    Log In
                </button>
            </div>
        </form>

    </div>

</body>
</html>
